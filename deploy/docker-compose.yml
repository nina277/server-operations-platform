# 自律型サーバー運用支援システム (server-operations-platform)
# 既存システムとは独立したComposeプロジェクトとして運用する。
name: server-operations

services:
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      # 外部へ公開するポートはこの1つだけ
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - web
      - api
    networks:
      - frontend

  web:
    build:
      context: ../client-web
    restart: unless-stopped
    # 外部ポートは公開しない(nginx経由でのみアクセスする)
    networks:
      - frontend

  api:
    build:
      context: ../server
      dockerfile: ServerOperations.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      TZ: ${TZ:-Asia/Tokyo}
      ConnectionStrings__Default: "Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};CharSet=utf8mb4;"
      Database__AutoMigrate: "true"
      DataProtection__KeysPath: /app/keys
      Jwt__SigningKey: ${JWT_SIGNING_KEY}
      InitialAdmin__Username: ${INITIAL_ADMIN_USERNAME:-}
      InitialAdmin__Password: ${INITIAL_ADMIN_PASSWORD:-}
    volumes:
      # Data Protection鍵(MFAシークレット暗号化)をコンテナ再作成後も保持する
      - api-keys:/app/keys
    # 外部ポートは公開しない(nginx経由でのみアクセスする)
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - frontend
      - backend

  worker:
    build:
      context: ../server
      dockerfile: ServerOperations.Worker/Dockerfile
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      TZ: ${TZ:-Asia/Tokyo}
      ConnectionStrings__Default: "Server=mysql;Port=3306;Database=${MYSQL_DATABASE};User=${MYSQL_USER};Password=${MYSQL_PASSWORD};CharSet=utf8mb4;"
      Collection__Cron: "${COLLECTION_CRON:-* * * * *}"
      DataProtection__KeysPath: /app/keys
    volumes:
      # APIと同じData Protection鍵を共有する(APIが暗号化した対象資格情報の復号に必要)
      - api-keys:/app/keys
    # 外部ポートは公開しない
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      # backend: MySQL接続用(内部専用)
      # frontend: LAN上の監視対象(Docker Socket Proxy / HTTP)への到達用
      - backend
      - frontend

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: ${TZ:-Asia/Tokyo}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # 外部ポートは公開しない
    networks:
      - backend

volumes:
  mysql-data:
  api-keys:

networks:
  frontend:
  backend:
    # backendは内部専用ネットワークとし、外部との直接通信を遮断する
    internal: true
